# Docker Compose for local development
version: '3.8'

services:
  # PostgreSQL Database for local development
  postgres:
    image: postgres:15-alpine
    container_name: attreq_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: attreq_db
      POSTGRES_USER: attreq_user
      POSTGRES_PASSWORD: attreq_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - attreq_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attreq_user -d attreq_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching (optional for Phase 1)
  redis:
    image: redis:7-alpine
    container_name: attreq_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - attreq_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  attreq_network:
    driver: bridge
