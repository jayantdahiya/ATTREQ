# Docker Compose for ATTREQ Backend Production
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: attreq_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - attreq_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: attreq_redis_prod
    restart: unless-stopped
    networks:
      - attreq_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ATTREQ Backend API
  backend:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    container_name: attreq_backend_prod
    restart: unless-stopped
    environment:
      # Database Configuration
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      
      # Application Settings
      APP_NAME: ATTREQ
      APP_ENV: production
      APP_DEBUG: "false"
      
      # JWT Configuration
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 15
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      
      # CORS Configuration
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS}
      
      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      
      # External APIs
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME}
      GEMINI_BATCH_SIZE: ${GEMINI_BATCH_SIZE}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      
      # File Upload Settings
      MAX_UPLOAD_SIZE_MB: 10
      UPLOAD_DIR: ./uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - attreq_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      sh -c "
        echo 'Waiting for database to be ready...' &&
        sleep 10 &&
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting FastAPI server...' &&
        uvicorn attreq_api.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  attreq_network:
    driver: bridge
